<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager | Categories</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --page-bg: #f8f9fc;
            --card-bg: #ffffff;
            --table-header-bg: #eef2f7;

            --badge-status-bg: #e3e8fc;
            --badge-status-text: #4a5c9a;

            --badge-high-bg: #ffe6e6;
            --badge-high-text: #cc0000;
            --badge-high-border: #ffcccc;

            --badge-medium-bg: #fff5e6;
            --badge-medium-text: #cc7a00;
            --badge-medium-border: #ffe8cc;

            --badge-low-bg: #e6f9ec;
            --badge-low-text: #00802b;
            --badge-low-border: #ccf2d9;
        }

        body {
            background-color: var(--page-bg);
            color: #4a4a4a;
            font-family: 'Nunito', sans-serif;
        }

        .dashboard-container {
            margin-top: 10px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            padding: 35px;
            border: 1px solid #f0f0f0;
        }

        .page-title {
            color: #5c6b8c;
            font-weight: 800;
        }

        .table thead th {
            background-color: var(--table-header-bg);
            color: #6b7a99;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: none;
            padding: 15px;
        }

        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            color: #555;
            border-bottom: 1px solid #f1f4f8;
        }

        .table tbody tr:hover {
            background-color: #fcfdfe;
        }

        .custom-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-block;
        }

        .status-badge {
            background-color: var(--badge-status-bg);
            color: var(--badge-status-text);
        }

        .badge-high {
            background-color: var(--badge-high-bg);
            color: var(--badge-high-text);
            border: 1px solid var(--badge-high-border);
        }

        .badge-medium {
            background-color: var(--badge-medium-bg);
            color: var(--badge-medium-text);
            border: 1px solid var(--badge-medium-border);
        }

        .badge-low {
            background-color: var(--badge-low-bg);
            color: var(--badge-low-text);
            border: 1px solid var(--badge-low-border);
        }

        /* Category tag pill shown in the header when a filter is active */
        .category-tag {
            background-color: #e3e8fc;
            color: #4a5c9a;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Empty / prompt state */
        .empty-state {
            padding: 60px 0;
            color: #adb5bd;
        }

        .empty-icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments :: navbar(activePage='categories')}"></div>

<div class="container dashboard-container mb-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h3 class="page-title mb-0">
                <i class="bi bi-tags me-2"></i>Category Tasks
                <span th:if="${categoryName != null and !#strings.isEmpty(categoryName)}"
                      class="category-tag ms-2"
                      th:text="${categoryName}">
                </span>
            </h3>
            <p class="text-muted small mb-0 mt-1"
               th:if="${tasks != null}">
                <span th:text="${taskCount}"></span> task(s) found
            </p>
        </div>
    </div>

    <!-- Search Form -->
    <form method="get" action="/categories"
          class="row g-3 mb-4 p-3 rounded-3"
          style="background-color: #f8fafc; border: 1px solid #e2e8f0;">

        <div class="col-md-4">
            <label class="form-label text-muted fw-bold small mb-1">Category Name</label>
            <input type="text"
                   name="name"
                   class="form-control border-0 shadow-sm"
                   th:value="${categoryName}"
                   placeholder="e.g. Development, Design, Testing" />
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn text-white w-100 shadow-sm"
                    style="background-color: #64748b;">
                <i class="bi bi-search me-1"></i> Search
            </button>
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <a href="/categories"
               class="btn btn-white text-muted w-100 shadow-sm border"
               style="background-color: white;">
                Clear
            </a>
        </div>
    </form>

    <!-- Error Message -->
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <!-- Tasks Table -->
    <table class="table align-middle"
           th:if="${tasks != null and !tasks.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Task Name</th>
            <th>Project</th>
            <th>Owner</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Due Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td class="text-muted fw-bold"
                th:text="'#' + ${task.taskId}"></td>

            <td class="fw-bold" style="color: #3b4863;"
                th:text="${task.taskName}"></td>

            <td>
                <i class="bi bi-folder-fill text-muted me-1" style="opacity: 0.5;"></i>
                <span th:text="${task.projectName != null ? task.projectName : '—'}"></span>
            </td>

            <td>
                <i class="bi bi-person-circle text-muted me-1" style="opacity: 0.5;"></i>
                <span th:text="${task.userName != null ? task.userName : '—'}"></span>
            </td>

            <td>
                <span class="custom-badge status-badge">
                    <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem; vertical-align: middle;"></i>
                    <span th:text="${task.status}"></span>
                </span>
            </td>

            <td>
                <span th:classappend="${task.priority == 'High' ? 'badge-high' : (task.priority == 'Low' ? 'badge-low' : 'badge-medium')}"
                      class="custom-badge shadow-sm"
                      th:text="${task.priority}"></span>
            </td>

            <td>
                <i class="bi bi-calendar-event text-muted me-1" style="opacity: 0.5;"></i>
                <span th:text="${task.dueDate}"></span>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Prompt state: no search done yet -->
    <div th:if="${categoryName == null or #strings.isEmpty(categoryName)}"
         class="text-center empty-state">
        <div class="empty-icon">🏷️</div>
        <p class="mt-2 fs-5 fw-semibold">Search by category</p>
        <p class="text-muted">Enter a category name above to see all tasks under it.</p>
    </div>

    <!-- Empty state: search returned nothing (and no error) -->
    <div th:if="${categoryName != null and !#strings.isEmpty(categoryName) and (tasks == null or tasks.isEmpty()) and error == null}"
         class="text-center empty-state">
        <div class="empty-icon">📂</div>
        <p class="mt-2 fs-5 fw-semibold">No tasks found</p>
        <p class="text-muted">
            No tasks are linked to category
            <strong th:text="${categoryName}"></strong>.
        </p>
    </div>

</div>

</body>
</html>
