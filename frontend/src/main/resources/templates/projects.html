<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager | Projects</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --page-bg: #f8f9fc;
            --card-bg: #ffffff;
            --table-header-bg: #eef2f7;
        }

        body {
            background-color: var(--page-bg);
            color: #4a4a4a;
            font-family: 'Nunito', sans-serif;
        }

        .dashboard-container {
            margin-top: 10px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            padding: 35px;
            border: 1px solid #f0f0f0;
        }

        .page-title {
            color: #5c6b8c;
            font-weight: 800;
        }

        .table thead th {
            background-color: var(--table-header-bg);
            color: #6b7a99;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: none;
            padding: 15px;
        }

        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            color: #555;
            border-bottom: 1px solid #f1f4f8;
        }

        .table tbody tr:hover {
            background-color: #fcfdfe;
        }
    </style>
</head>
<body>

<!-- same navbar as other pages -->
<div th:replace="~{fragments :: navbar(activePage='projects')}"></div>

<div class="container dashboard-container mb-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="page-title mb-0">
            <i class="bi bi-folder2-open me-2"></i>Project Portfolio
        </h3>
    </div>

    <!-- Date filter form -->
    <form method="get" action="/projects"
          class="row g-3 mb-4 p-3 rounded-3"
          style="background-color: #f8fafc; border: 1px solid #e2e8f0;">

        <div class="col-md-3">
            <label class="form-label text-muted fw-bold small mb-1">Start Date</label>
            <input type="date" name="startDate" class="form-control border-0 shadow-sm"
                   th:value="${startDate}" />
        </div>

        <div class="col-md-3">
            <label class="form-label text-muted fw-bold small mb-1">End Date</label>
            <input type="date" name="endDate" class="form-control border-0 shadow-sm"
                   th:value="${endDate}" />
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn text-white w-100 shadow-sm"
                    style="background-color: #64748b;">
                <i class="bi bi-funnel me-1"></i> Filter
            </button>
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <a href="/projects" class="btn btn-white text-muted w-100 shadow-sm border"
               style="background-color: white;">Clear</a>
        </div>

    </form>

    <!-- Error message -->
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <!-- Projects table -->
    <table class="table align-middle"
           th:if="${projects != null and !projects.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Project Name</th>
            <th>Owner</th>
            <th>Start Date</th>
            <th>End Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td class="text-muted fw-bold"
                th:text="'#' + ${project.projectId}"></td>
            <td class="fw-bold" style="color: #3b4863;"
                th:text="${project.projectName}"></td>
            <td>
                <i class="bi bi-person-circle text-muted me-1"
                   style="opacity: 0.5;"></i>
                <span th:text="${project.ownerName}"></span>
            </td>
            <td>
                <i class="bi bi-calendar-event text-muted me-1"
                   style="opacity: 0.5;"></i>
                <span th:text="${project.startDate}"></span>
            </td>
            <td>
                <i class="bi bi-calendar-check text-muted me-1"
                   style="opacity: 0.5;"></i>
                <span th:text="${project.endDate}"></span>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- No data message -->
    <div th:if="${projects == null or projects.isEmpty()}"
         class="text-center py-5 text-muted">
        <i class="bi bi-folder-x" style="font-size: 3rem;"></i>
        <p class="mt-2 fs-5 fw-semibold">No projects found</p>
    </div>

</div>

</body>
</html>
