<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar(activePage)">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/tasks">🚀 TaskManager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'tasks'} ? 'active fw-bold' : ''" href="/tasks">Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'projects'} ? 'active fw-bold' : ''" href="/projects">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'users'} ? 'active fw-bold' : ''" href="/users">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${activePage == 'categories'} ? 'active fw-bold' : ''" href="/categories">Categories</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <a href="/notifications" class="btn btn-light position-relative">
                        🔔 Alerts
                        <span class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-light rounded-circle">
                                <span class="visually-hidden">New alerts</span>
                            </span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
