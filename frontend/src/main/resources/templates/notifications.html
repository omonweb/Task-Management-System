<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager | Notifications</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --page-bg: #f8f9fc;
            --card-bg: #ffffff;
            --table-header-bg: #eef2f7;
            --text-primary: #4a4a4a;
            --text-muted-soft: #6b7a99;
        }

        body {
            background-color: var(--page-bg);
            color: var(--text-primary);
            font-family: 'Nunito', sans-serif;
        }

        .dashboard-container {
            margin-top: 10px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            padding: 35px;
            border: 1px solid #f0f0f0;
        }

        .page-title {
            color: #5c6b8c;
            font-weight: 800;
        }

        .table thead th {
            background-color: var(--table-header-bg);
            color: var(--text-muted-soft);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: none;
            padding: 15px;
        }

        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            color: #555;
            border-bottom: 1px solid #f1f4f8;
        }

        .table tbody tr:hover {
            background-color: #fcfdfe;
        }

        .user-filter-form .form-control {
            max-width: 160px;
        }

        .notif-count-badge {
            font-size: 0.8rem;
        }

        .notif-text-cell {
            max-width: 420px;
            word-wrap: break-word;
            white-space: normal;
        }

        .avatar-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a3b8e0, #6b7a99);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .empty-state {
            padding: 60px 0;
            color: #adb5bd;
        }

        .empty-icon {
            font-size: 3rem;
        }

        .error-alert {
            background-color: #fff5f5;
            border: 1px solid #fecdca;
            border-left: 4px solid #f04438;
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error-alert .error-icon {
            font-size: 1.4rem;
            color: #f04438;
            flex-shrink: 0;
        }

        .error-alert .error-title {
            font-weight: 700;
            color: #b42318;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .error-alert .error-message {
            color: #d92d20;
            font-size: 0.88rem;
            margin: 0;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments :: navbar(activePage='notifications')}"></div>

<div class="container dashboard-container">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <h2 class="page-title mb-0">
                <i class="bi bi-bell-fill me-2"></i>
                Notifications
                <span th:if="${count > 0}"
                      class="badge bg-danger notif-count-badge"
                      th:text="${count}"></span>
            </h2>
            <p class="text-muted small mb-0">
                Showing alerts for user ID
                <strong th:text="${userId}"></strong>
            </p>
        </div>

        <!-- User Filter -->
        <form method="get" action="/notifications" class="d-flex align-items-center gap-2 user-filter-form">
            <label for="userIdInput" class="form-label mb-0 text-muted small">User ID:</label>
            <input
                    id="userIdInput"
                    type="number"
                    name="userId"
                    class="form-control form-control-sm"
                    th:value="${userId}"
                    min="1"
                    placeholder="e.g. 1"
            />
            <button type="submit" class="btn btn-sm text-white shadow-sm"
                    style="background-color: #4a5c9a; border-radius: 8px; padding: 8px 16px;">
                <i class="bi bi-search me-1"></i> Go
            </button>
        </form>
    </div>

    <!-- Error Alert -->
    <div th:if="${error != null}" class="error-alert mb-4">
        <i class="bi bi-exclamation-circle-fill error-icon"></i>
        <div>
            <div class="error-title">Invalid User ID</div>
            <p class="error-message" th:text="${error}"></p>
        </div>
    </div>

    <!-- Table -->
    <div th:if="${error == null and not #lists.isEmpty(notifications)}">
        <table class="table align-middle">
            <thead>
            <tr>
                <th class="text-center">#</th>
                <th class="text-center">Notification ID</th>
                <th class="text-center">User</th>
                <th class="text-center">Email</th>
                <th class="text-center">Message</th>
                <th class="text-center">Received At</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="notif, iterStat : ${notifications}">
                <td class="text-center text-muted small" th:text="${iterStat.count}"></td>
                <td class="text-center text-muted small" th:text="${notif.notificationId}"></td>

                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar-circle"
                             th:text="${#strings.toUpperCase(#strings.substring(notif.userName, 0, 1))}">
                        </div>
                        <span class="fw-semibold" th:text="${notif.userName}"></span>
                    </div>
                </td>

                <td class="text-center text-muted small" th:text="${notif.email}"></td>
                <td class="text-center notif-text-cell" th:text="${notif.text}"></td>

                <td class="text-center text-muted small"
                    th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy, HH:mm')}">
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State (valid user but no notifications) -->
    <div th:if="${error == null and #lists.isEmpty(notifications)}" class="text-center empty-state">
        <div class="empty-icon">📭</div>
        <p class="mt-2 fs-5 fw-semibold">No notifications found</p>
        <p class="text-muted">User ID <strong th:text="${userId}"></strong> has no alerts yet.</p>
    </div>

</div>

</body>
</html>
