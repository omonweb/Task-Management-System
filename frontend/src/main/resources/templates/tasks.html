<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager | Tasks</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            /* Pastel Palette Variables */
            --page-bg: #f8f9fc;
            --card-bg: #ffffff;
            --table-header-bg: #eef2f7;

            /* Status Badges */
            --badge-status-bg: #e3e8fc;
            --badge-status-text: #4a5c9a;

            /* Priority Badges */
            --badge-high-bg: #ffe6e6; /* Pastel Red */
            --badge-high-text: #cc0000; /* Deep Red for visibility */
            --badge-high-border: #ffcccc;

            --badge-medium-bg: #fff5e6; /* Pastel Orange */
            --badge-medium-text: #cc7a00;
            --badge-medium-border: #ffe8cc;

            --badge-low-bg: #e6f9ec; /* Pastel Green */
            --badge-low-text: #00802b;
            --badge-low-border: #ccf2d9;
        }

        body {
            background-color: var(--page-bg);
            color: #4a4a4a;
            font-family: 'Nunito', sans-serif; /* Applied soft font */
        }

        .dashboard-container {
            margin-top: 10px;
            background-color: var(--card-bg);
            border-radius: 16px; /* Softer rounded corners */
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); /* Softer, larger shadow */
            padding: 35px;
            border: 1px solid #f0f0f0;
        }

        .page-title {
            color: #5c6b8c;
            font-weight: 800;
        }

        /* Table Styling */
        .table { margin-top: 20px; }
        .table thead th {
            background-color: var(--table-header-bg);
            color: #6b7a99;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: none;
            padding: 15px;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            color: #555;
            border-bottom: 1px solid #f1f4f8;
        }
        .table tbody tr:hover { background-color: #fcfdfe; }

        /* Custom Badge Styling */
        .custom-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-block;
        }

        .status-badge {
            background-color: var(--badge-status-bg);
            color: var(--badge-status-text);
        }

        .badge-high {
            background-color: var(--badge-high-bg);
            color: var(--badge-high-text);
            border: 1px solid var(--badge-high-border);
        }
        .badge-medium {
            background-color: var(--badge-medium-bg);
            color: var(--badge-medium-text);
            border: 1px solid var(--badge-medium-border);
        }
        .badge-low {
            background-color: var(--badge-low-bg);
            color: var(--badge-low-text);
            border: 1px solid var(--badge-low-border);
        }

        /* Pagination Styling */
        .pagination .page-link {
            color: #6b7a99;
            border-color: #eef2f7;
            margin: 0 3px;
            border-radius: 8px;
        }
        .pagination .page-item.active .page-link {
            background-color: #a3b8e0;
            border-color: #a3b8e0;
            color: white;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar(activePage='tasks')}"></div>

<div class="container dashboard-container mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="page-title mb-0">
            <i class="bi bi-card-checklist me-2"></i>System Tasks Overview
        </h3>
        <button class="btn btn-sm text-white shadow-sm" style="background-color: #4a5c9a; border-radius: 8px; padding: 8px 16px;">
            <i class="bi bi-plus-lg me-1"></i> New Task
        </button>
    </div>

    <form method="get" action="/tasks" class="row g-3 mb-4 p-3 rounded-3" style="background-color: #f8fafc; border: 1px solid #e2e8f0;">
        <div class="col-md-3">
            <label class="form-label text-muted fw-bold small mb-1">Priority</label>
            <select name="priority" class="form-select border-0 shadow-sm text-secondary">
                <option value="">All Priorities</option>
                <option value="High" th:selected="${selectedPriority == 'High'}">High</option>
                <option value="Medium" th:selected="${selectedPriority == 'Medium'}">Medium</option>
                <option value="Low" th:selected="${selectedPriority == 'Low'}">Low</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label text-muted fw-bold small mb-1">Status</label>
            <select name="status" class="form-select border-0 shadow-sm text-secondary">
                <option value="">All Statuses</option>
                <option value="Pending" th:selected="${selectedStatus == 'Pending'}">Pending</option>
                <option value="Completed" th:selected="${selectedStatus == 'Completed'}">Completed</option>
            </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn text-white w-100 shadow-sm" style="background-color: #64748b;">
                <i class="bi bi-funnel me-1"></i> Filter
            </button>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <a href="/tasks" class="btn btn-white text-muted w-100 shadow-sm border" style="background-color: white;">Clear</a>
        </div>
    </form>

    <table class="table align-middle">
        <thead>
        <tr>
            <th class="rounded-start">ID</th>
            <th>Task Name</th>
            <th>Project</th>
            <th>Owner</th>
            <th>Status</th>
            <th>Priority</th>
            <th class="rounded-end">Due Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td class="text-muted fw-bold" th:text="'#' + ${task.taskId}"></td>
            <td class="fw-bold" style="color: #3b4863;" th:text="${task.taskName}"></td>
            <td>
                <i class="bi bi-folder-fill text-muted me-1" style="opacity: 0.5;"></i>
                <span th:text="${task.projectName}"></span>
            </td>
            <td>
                <i class="bi bi-person-circle text-muted me-1" style="opacity: 0.5;"></i>
                <span th:text="${task.userName}"></span>
            </td>
            <td>
                <span class="custom-badge status-badge">
                    <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem; vertical-align: middle;"></i>
                    <span th:text="${task.status}"></span>
                </span>
            </td>
            <td>
                <span th:classappend="${task.priority == 'High' ? 'badge-high' : (task.priority == 'Low' ? 'badge-low' : 'badge-medium')}"
                      class="custom-badge shadow-sm" th:text="${task.priority}"></span>
            </td>
            <td>
                <i class="bi bi-calendar-event text-muted me-1" style="opacity: 0.5;"></i>
                <span th:text="${task.dueDate}"></span>
            </td>
        </tr>
        </tbody>
    </table>

    <nav class="mt-5" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center shadow-sm d-inline-flex rounded-3" style="background-color: white; padding: 5px;">
            <li class="page-item" th:classappend="${isFirst ? 'disabled' : ''}">
                <a class="page-link border-0" th:href="@{/tasks(page=${currentPage - 1}, priority=${selectedPriority}, status=${selectedStatus})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link border-0 fw-bold" th:href="@{/tasks(page=${i}, priority=${selectedPriority}, status=${selectedStatus})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${isLast ? 'disabled' : ''}">
                <a class="page-link border-0" th:href="@{/tasks(page=${currentPage + 1}, priority=${selectedPriority}, status=${selectedStatus})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
