<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager | Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; color: #333; }

        /* Adjusted margin-top because the navbar adds spacing */
        .dashboard-container {
            margin-top: 10px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 30px;
        }
        .table thead th { background-color: #e9ecef; color: #495057; border-bottom: none; }
        .badge-high { background-color: #ffeeba; color: #856404; }
        .badge-medium { background-color: #e2e3e5; color: #383d41; }
        .badge-low { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar(activePage='tasks')}"></div>

<div class="container dashboard-container">
    <h2 class="mb-4 text-primary">System Tasks Overview</h2>

    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Task Name</th>
            <th>Project</th>
            <th>Owner</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Due Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.taskId}"></td>
            <td class="fw-bold" th:text="${task.taskName}"></td>
            <td th:text="${task.projectName}"></td>
            <td th:text="${task.userName}"></td>
            <td>
                <span class="badge bg-secondary" th:text="${task.status}"></span>
            </td>
            <td>
                <span th:classappend="${task.priority == 'High' ? 'badge-high' : (task.priority == 'Low' ? 'badge-low' : 'badge-medium')}"
                      class="badge" th:text="${task.priority}"></span>
            </td>
            <td th:text="${task.dueDate}"></td>
        </tr>
        </tbody>
    </table>

    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${isFirst ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/tasks(page=${currentPage - 1})}">Previous</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/tasks(page=${i})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${isLast ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/tasks(page=${currentPage + 1})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
